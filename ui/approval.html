<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>余白のAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #0a0a0a;
  --black2: #111111;
  --black3: #181818;
  --black4: #222222;
  --white: #f5f2ed;
  --white2: #a0a09a;
  --white3: #555550;
  --white4: #2a2a28;
  --green: #c8f04a;
  --red: #ff3c3c;
  --amber: #f0960a;
  --blue: #5090f0;
  --pink: #f06090;
  --border: rgba(245,242,237,0.08);
  --border2: rgba(245,242,237,0.16);
  --display: 'Bebas Neue', sans-serif;
  --sans: 'Noto Sans JP', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

html { font-size: 14px; }

body {
  background: var(--black);
  color: var(--white);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 200;
  height: 56px;
  background: var(--black);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}

.h-logo {
  font-family: var(--display);
  font-size: 32px;
  letter-spacing: 0.04em;
  color: var(--white);
  line-height: 1;
  flex-shrink: 0;
}

.h-sub {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--white3);
  text-transform: uppercase;
  line-height: 1.3;
  display: none;
}

@media (min-width: 600px) { .h-sub { display: block; } }

.h-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.h-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white3);
  letter-spacing: 0.08em;
}

.h-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--green);
  letter-spacing: 0.12em;
}

.h-live::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

.h-pending {
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: 0.1em;
  color: var(--black);
  background: var(--green);
  padding: 3px 10px;
  border-radius: 100px;
  line-height: 1;
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 1fr;
}

@media (min-width: 1000px) {
  .layout {
    grid-template-columns: 280px 1fr 260px 260px;
    min-height: calc(100vh - 56px);
  }
}

/* ── PANEL ── */
.panel {
  border-right: 1px solid var(--border);
  display: none;
}

.panel.active { display: block; }

@media (min-width: 1000px) {
  .panel { display: block !important; }
  .panel:last-child { border-right: none; }
}

/* ── PANEL HEADER ── */
.panel-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.panel-title {
  font-family: var(--display);
  font-size: 36px;
  letter-spacing: 0.06em;
  line-height: 1;
  color: var(--white);
}

.panel-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--white3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  line-height: 1;
}

.panel-count {
  margin-left: auto;
  font-family: var(--display);
  font-size: 24px;
  color: var(--green);
  letter-spacing: 0.05em;
  line-height: 1;
}

/* ── PANEL BODY ── */
.panel-body { padding: 16px 20px; }

/* ── INTEL CARD ── */
.intel {
  border: 1px solid var(--border);
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
}

.intel:hover { border-color: var(--border2); }

.i-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.i-bar-w { background: var(--white2); }
.i-bar-a { background: var(--amber); }
.i-bar-b { background: var(--blue); }

.i-inner { padding: 12px 14px 12px 18px; }

.i-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
}

.i-title {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.55;
  color: var(--white);
  flex: 1;
  letter-spacing: 0.01em;
}

.tags { display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0; }

.tag {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 100px;
  border: 1px solid;
  white-space: nowrap;
  line-height: 1.6;
}

.t-w { color: var(--white2); border-color: var(--border2); }
.t-g { color: var(--green); border-color: rgba(200,240,74,0.35); background: rgba(200,240,74,0.04); }
.t-a { color: var(--amber); border-color: rgba(240,150,10,0.35); background: rgba(240,150,10,0.04); }
.t-b { color: var(--blue); border-color: rgba(80,144,240,0.35); background: rgba(80,144,240,0.04); }
.t-r { color: var(--red); border-color: rgba(255,60,60,0.35); background: rgba(255,60,60,0.04); }

.i-body {
  font-size: 11px;
  color: var(--white2);
  line-height: 1.7;
  margin-bottom: 8px;
  letter-spacing: 0.01em;
}

.i-note {
  font-size: 11px;
  line-height: 1.65;
  padding: 7px 10px;
  border-left: 2px solid var(--border2);
  margin-bottom: 10px;
  color: var(--white2);
}

.i-note-a { border-color: var(--amber); color: rgba(240,150,10,0.85); }
.i-note-b { border-color: var(--blue); }

.i-actions { display: flex; gap: 6px; }

.btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--white2);
  border-radius: 100px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.12s;
  line-height: 1.4;
}

.btn:hover { border-color: var(--white); color: var(--white); }

.btn-use {
  flex: 1;
  color: var(--green);
  border-color: rgba(200,240,74,0.3);
  background: rgba(200,240,74,0.03);
}

.btn-use:hover { background: rgba(200,240,74,0.1); border-color: var(--green); }

/* ── POST CARD ── */
.post {
  border: 1px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
  transition: border-color 0.15s;
  animation: rise 0.3s ease both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.post:nth-child(1) { animation-delay: 0.04s; }
.post:nth-child(2) { animation-delay: 0.09s; }
.post:nth-child(3) { animation-delay: 0.14s; }

.post.approved { border-color: rgba(200,240,74,0.25); opacity: 0.5; }
.post.rejected { border-color: rgba(255,60,60,0.2); opacity: 0.3; }

/* post head */
.p-head {
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.platform {
  font-family: var(--display);
  font-size: 15px;
  letter-spacing: 0.1em;
  border: 1px solid;
  border-radius: 100px;
  padding: 0 10px 1px;
  line-height: 1.6;
}

.px { color: var(--white); border-color: var(--border2); }
.pt { color: var(--blue); border-color: rgba(80,144,240,0.3); }

.score {
  margin-left: auto;
  font-family: var(--display);
  font-size: 22px;
  color: var(--green);
  letter-spacing: 0.03em;
  line-height: 1;
}

/* source strip */
.p-src {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  background: rgba(255,255,255,0.015);
}

.src-label {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--white4);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  flex-shrink: 0;
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 3px;
}

.src-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--white2);
}

.trust {
  font-family: var(--mono);
  font-size: 7px;
  padding: 1px 5px;
  border-radius: 100px;
  border: 1px solid;
  letter-spacing: 0.06em;
  line-height: 1.6;
}

.tr-h { color: var(--green); border-color: rgba(200,240,74,0.35); }
.tr-m { color: var(--amber); border-color: rgba(240,150,10,0.35); }

.src-link {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--white3);
  text-decoration: none;
  margin-left: 2px;
}
.src-link:hover { color: var(--white); }

/* layers */
.p-layer-toggle {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  cursor: pointer;
  user-select: none;
  background: rgba(255,255,255,0.01);
  transition: background 0.1s;
}

.p-layer-toggle:hover { background: rgba(255,255,255,0.025); }

.layer-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--white3);
  letter-spacing: 0.1em;
  flex: 1;
  text-transform: uppercase;
}

.chevron {
  font-size: 8px;
  color: var(--white3);
  transition: transform 0.2s;
  display: inline-block;
}
.chevron.open { transform: rotate(180deg); }

.layers { display: none; border-bottom: 1px solid var(--border); }
.layers.open { display: block; }

.lrow {
  display: flex;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.lrow:last-child { border-bottom: none; }

.lid {
  font-family: var(--mono);
  font-size: 8px;
  padding: 2px 7px;
  border-radius: 100px;
  border: 1px solid;
  flex-shrink: 0;
  margin-top: 2px;
  letter-spacing: 0.06em;
  line-height: 1.6;
}

.l1c { color: var(--blue); border-color: rgba(80,144,240,0.35); }
.l2c { color: var(--white2); border-color: var(--border2); }
.l3c { color: var(--green); border-color: rgba(200,240,74,0.35); }

.ltext {
  font-size: 11px;
  color: var(--white2);
  line-height: 1.7;
}

/* post body */
.p-body {
  padding: 14px;
  font-size: 13px;
  color: var(--white);
  line-height: 1.9;
  white-space: pre-line;
  letter-spacing: 0.015em;
}

/* post actions */
.p-actions {
  display: grid;
  grid-template-columns: 1fr 1fr 44px;
  border-top: 1px solid var(--border);
}

.pa {
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--display);
  font-size: 16px;
  letter-spacing: 0.1em;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: background 0.12s;
}

.pa-ok { color: var(--green); border-right: 1px solid var(--border); }
.pa-ok:hover { background: rgba(200,240,74,0.07); }
.pa-ng { color: var(--red); border-right: 1px solid var(--border); }
.pa-ng:hover { background: rgba(255,60,60,0.07); }
.pa-ed { color: var(--white3); font-size: 14px; font-family: var(--sans); }
.pa-ed:hover { color: var(--white2); background: var(--black3); }

/* ── STATS ── */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 16px;
}

.stat {
  background: var(--black);
  padding: 14px 12px;
}

.stat-lbl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--white3);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.stat-num {
  font-family: var(--display);
  font-size: 30px;
  color: var(--white);
  letter-spacing: 0.02em;
  line-height: 1;
}

.stat-d {
  font-family: var(--mono);
  font-size: 10px;
  margin-top: 4px;
}

.up { color: var(--green); }
.dn { color: var(--red); }

/* mvp */
.mvp {
  border: 1px solid var(--border);
  padding: 14px;
  margin-bottom: 14px;
  position: relative;
}

.mvp::before {
  content: 'MVP';
  position: absolute;
  top: -1px; right: 12px;
  font-family: var(--display);
  font-size: 11px;
  letter-spacing: 0.15em;
  background: var(--amber);
  color: var(--black);
  padding: 1px 8px;
  border-radius: 0 0 4px 4px;
}

.mvp-text {
  font-size: 12px;
  color: var(--white2);
  line-height: 1.7;
  margin-bottom: 10px;
  margin-top: 4px;
}

.mvp-row { display: flex; gap: 14px; }

.mvp-stat {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--white3);
}

.mvp-stat em { color: var(--white2); font-style: normal; font-weight: 700; }

/* section divider */
.s-div {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0 12px;
}

.s-div-label {
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--white3);
  flex-shrink: 0;
}

.s-div-line { flex: 1; height: 1px; background: var(--border); }

/* analyst rows */
.arow {
  display: flex;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.arow:last-of-type { border-bottom: none; }

.adot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 7px;
}

.ad-g { background: var(--green); }
.ad-a { background: var(--amber); }
.ad-b { background: var(--blue); }
.ad-r { background: var(--red); }

.atxt { font-size: 12px; color: var(--white2); line-height: 1.7; }
.atxt strong { color: var(--white); font-weight: 500; }

/* persona card */
.persona {
  border: 1px solid var(--border);
  margin-bottom: 8px;
  overflow: hidden;
}

.persona-head {
  background: var(--black2);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.p-rank {
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: 0.12em;
  border-radius: 100px;
  border: 1px solid;
  padding: 0 9px 1px;
  line-height: 1.6;
}

.pr-core { color: var(--white); border-color: var(--border2); }
.pr-grow { color: var(--blue); border-color: rgba(80,144,240,0.35); }
.pr-wild { color: var(--amber); border-color: rgba(240,150,10,0.35); }

.p-name { font-size: 11px; font-weight: 500; color: var(--white); line-height: 1.4; }

.persona-body { padding: 10px 12px; }

.p-desc { font-size: 11px; color: var(--white2); line-height: 1.7; margin-bottom: 8px; }

.chips { display: flex; gap: 4px; flex-wrap: wrap; }

.chip {
  font-size: 10px;
  color: var(--white3);
  background: var(--black3);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 100px;
  line-height: 1.6;
}

/* chart */
.chart-wrap { margin-top: 16px; }

.chart-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}

.chart-lbl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--white3);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.chart-val {
  font-family: var(--display);
  font-size: 18px;
  color: var(--green);
  letter-spacing: 0.05em;
  line-height: 1;
}

.bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 28px;
}

.bar {
  flex: 1;
  background: var(--black3);
  border-radius: 1px 1px 0 0;
  cursor: pointer;
  transition: background 0.12s;
}

.bar:hover { background: var(--white3); }
.bar.today { background: var(--white); }

/* ── BOTTOM NAV ── */
.bnav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--black);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom);
}

@media (min-width: 1000px) { .bnav { display: none; } }

.bt {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 0 8px;
  cursor: pointer;
  transition: color 0.12s;
  position: relative;
  color: var(--white3);
}

.bt.active { color: var(--white); }

.bt-icon {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: 0.05em;
  line-height: 1;
}

.bt-label {
  font-family: var(--mono);
  font-size: 7px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.bt-badge {
  position: absolute;
  top: 7px;
  right: calc(50% - 20px);
  background: var(--green);
  color: var(--black);
  font-family: var(--mono);
  font-size: 8px;
  font-weight: 700;
  width: 14px; height: 14px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}

/* padding for bottom nav */
@media (max-width: 999px) {
  .layout { padding-bottom: 72px; }
}

/* ── HISTORY CARDS ── */
.hist-card {
  border: 1px solid var(--border);
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.15s;
}
.hist-card:hover { border-color: var(--border2); }
.hist-card .i-bar { background: var(--black4); }
.hist-card.hist-feat .i-bar { background: var(--green); }
.hist-inner { padding: 10px 12px 10px 18px; }
.hist-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}
.hist-date {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--white3);
  margin-left: auto;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.hist-body {
  font-size: 12px;
  color: var(--white2);
  line-height: 1.7;
  margin-bottom: 9px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  white-space: pre-line;
}
.hist-metrics { display: flex; gap: 14px; }
.hist-m { font-family: var(--mono); font-size: 10px; color: var(--white3); }
.hist-m em { color: var(--white2); font-style: normal; font-weight: 500; }

/* ── QUEUE TABS ── */
.q-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.q-tab {
  flex: 1;
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  text-align: center;
  transition: color 0.15s, border-color 0.15s;
}
.q-tab:hover { color: var(--white2); }
.q-tab.active { color: var(--green); border-bottom-color: var(--green); }

.q-panel { display: none; }
.q-panel.active { display: block; animation: rise 0.2s ease both; }

/* ── STATUS BADGE ── */
.st-badge {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 100px;
  border: 1px solid;
  line-height: 1.6;
  white-space: nowrap;
}
.st-approved { color: var(--green); border-color: rgba(200,240,74,0.35); background: rgba(200,240,74,0.04); }
.st-posted { color: var(--white2); border-color: var(--border2); background: rgba(245,242,237,0.03); }
.st-pending { color: var(--amber); border-color: rgba(240,150,10,0.35); background: rgba(240,150,10,0.04); }

<script>
// ---- ユーティリティ ----
function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function escAttr(str) {
  if (str == null) return '';
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ---- パネル切替 ----
function sw(name) {
  ['intel','queue','stats','people'].forEach(n => {
    document.getElementById('panel-' + n).classList.toggle('active', n === name);
    document.getElementById('bt-' + n).classList.toggle('active', n === name);
  });
  if (name === 'people') loadPeople();
}

// ---- 3層トグル ----
function toggleLayer(el) {
  const body = el.nextElementSibling;
  const ch = el.querySelector('.chevron');
  body.classList.toggle('open');
  ch.classList.toggle('open');
}

// ---- カウント更新 ----
function updateCount(n) {
  const v = n != null ? n : document.querySelectorAll('#queue-body .post:not(.approved):not(.rejected)').length;
  document.getElementById('q-count').textContent = v;
  document.getElementById('bt-badge').textContent = v;
  document.getElementById('h-badge').textContent = v;
}

// ---- 承認 ----
async function approvePost(postId) {
  const el = document.getElementById('post-' + postId);
  if (!el || el.classList.contains('approved')) return;
  try {
    const res = await fetch('/api/approve/' + encodeURIComponent(postId), { method: 'POST' });
    if (!res.ok) throw new Error('API error');
    el.classList.add('approved');
    el.querySelector('.pa-ok').textContent = '✓ 承認';
    updateCount();
    // 承認済みタブが開いていれば即時更新
    if (document.getElementById('qpanel-approved').classList.contains('active')) {
      loadApproved();
    }
  } catch (e) {
    console.error('approve failed', e);
  }
}

// ---- 却下 ----
async function rejectPost(postId) {
  const el = document.getElementById('post-' + postId);
  if (!el || el.classList.contains('rejected')) return;
  try {
    const res = await fetch('/api/reject/' + encodeURIComponent(postId), { method: 'POST' });
    if (!res.ok) throw new Error('API error');
    el.classList.add('rejected');
    el.querySelector('.pa-ng').textContent = '✕ 却下';
    updateCount();
  } catch (e) {
    console.error('reject failed', e);
  }
}

// ---- 編集 ----
function editPost(postId) {
  const el = document.getElementById('post-' + postId);
  if (!el) return;
  const bodyEl = el.querySelector('.p-body');
  const actEl = el.querySelector('.p-actions');
  const origText = bodyEl.textContent;

  // インライン編集UIに切替
  bodyEl.innerHTML = '<textarea id="edit-ta-' + escAttr(postId) + '" style="width:100%;min-height:120px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;line-height:1.6;resize:vertical;box-sizing:border-box;">' + escHtml(origText) + '</textarea>';
  actEl.innerHTML = '<button class="pa pa-ok" onclick="saveEdit(\'' + escAttr(postId) + '\')">保存</button><button class="pa pa-ng" onclick="cancelEdit(\'' + escAttr(postId) + '\',\'' + escAttr(origText) + '\')">キャンセル</button>';
}

async function saveEdit(postId) {
  const ta = document.getElementById('edit-ta-' + postId);
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) return;
  try {
    const res = await fetch('/api/edit/' + encodeURIComponent(postId), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ post_text: newText }),
    });
    if (!res.ok) throw new Error('API error');
    const el = document.getElementById('post-' + postId);
    el.querySelector('.p-body').textContent = newText;
    el.querySelector('.p-actions').innerHTML =
      '<button class="pa pa-ok" onclick="approvePost(\'' + escAttr(postId) + '\')">OK</button>' +
      '<button class="pa pa-ng" onclick="rejectPost(\'' + escAttr(postId) + '\')">NG</button>' +
      '<button class="pa pa-ed" onclick="editPost(\'' + escAttr(postId) + '\')">✎</button>';
    el.classList.add('approved');
    updateCount();
  } catch (e) {
    alert('保存失敗: ' + e.message);
  }
}

function cancelEdit(postId, origText) {
  const el = document.getElementById('post-' + postId);
  if (!el) return;
  el.querySelector('.p-body').textContent = origText;
  el.querySelector('.p-actions').innerHTML =
    '<button class="pa pa-ok" onclick="approvePost(\'' + escAttr(postId) + '\')">OK</button>' +
    '<button class="pa pa-ng" onclick="rejectPost(\'' + escAttr(postId) + '\')">NG</button>' +
    '<button class="pa pa-ed" onclick="editPost(\'' + escAttr(postId) + '\')">✎</button>';
}

// ---- Intel使用 ----
function useIntel(btn) {
  btn.textContent = '✓ キューに追加';
  btn.style.color = 'var(--green)';
  btn.style.borderColor = 'rgba(200,240,74,0.5)';
  btn.style.background = 'rgba(200,240,74,0.08)';
  btn.disabled = true;
}

// ---- ブックマーク ----
const _BM_KEY = 'yohaku_bookmarks';
function getBookmarks() {
  try { return JSON.parse(localStorage.getItem(_BM_KEY) || '[]'); } catch { return []; }
}
function saveBookmarks(bms) {
  localStorage.setItem(_BM_KEY, JSON.stringify(bms));
}
function toggleBookmark(btn, iid) {
  const item = window._intelItems && window._intelItems[iid];
  if (!item) return;
  let bms = getBookmarks();
  const idx = bms.findIndex(b => b.title === item.title);
  if (idx === -1) {
    bms.push(item);
    btn.textContent = '🔖 保存済み';
    btn.style.color = 'var(--amber)';
  } else {
    bms.splice(idx, 1);
    btn.textContent = '🔖 保存';
    btn.style.color = '';
  }
  saveBookmarks(bms);
}

// ---- Intel item storage ----
let _iidCtr = 0;
window._intelItems = {};

// ---- Intel カード HTML 生成 ----
function buildIntelCard(item) {
  const iid = 'iid' + (_iidCtr++);
  window._intelItems[iid] = item;
  const bms = getBookmarks();
  const isBookmarked = bms.some(b => b.title === item.title);
  const barClass = item.is_featured ? 'i-bar-w'
    : item.info_type === 'TYPE_C' ? 'i-bar-a'
    : 'i-bar-b';
  const freshTag = item.freshness === 'A' ? '<span class="tag t-a">🔥 初出</span>'
    : item.freshness === 'B' ? '<span class="tag t-a">新着</span>'
    : item.freshness === 'C' ? '<span class="tag t-r">⚠ バズ</span>' : '';
  const trustTag = item.trust === 'HIGH' ? '<span class="tag t-g">HIGH</span>'
    : item.trust === 'MID' ? '<span class="tag t-b">MID</span>' : '';
  const layerTag = item.layer ? '<span class="tag t-w">' + escHtml(item.layer) + '</span>' : '';
  const snsTag = (item.source_type === 'SNS' && item.buzz_level)
    ? '<span class="tag t-a">𝕏 ' + escHtml(item.buzz_level) + '</span>' : '';
  const noteClass = item.info_type === 'TYPE_C' ? 'i-note i-note-a'
    : item.layer === 'MACRO' ? 'i-note i-note-b' : 'i-note';
  const btnLabel = item.info_type === 'TYPE_C' ? '+ 両論で使う' : '+ 投稿に使う';
  const bmStyle = isBookmarked ? ' style="color:var(--amber)"' : '';
  const bmLabel = isBookmarked ? '🔖 保存済み' : '🔖 保存';
  const snsInfo = (item.source_type === 'SNS' && (item.author || item.likes != null))
    ? '<div style="display:flex;gap:10px;margin-bottom:6px">'
      + (item.author ? '<span style="font-family:var(--mono);font-size:9px;color:var(--white3)">' + escHtml(item.author) + '</span>' : '')
      + (item.likes != null ? '<span style="font-family:var(--mono);font-size:9px;color:var(--white3)">❤ ' + item.likes + '</span>' : '')
      + '</div>' : '';
  return '<div class="intel">'
    + '<div class="i-bar ' + barClass + '"></div>'
    + '<div class="i-inner">'
    + '<div class="i-top">'
    + '<div class="i-title">' + escHtml(item.title) + '</div>'
    + '<div class="tags">' + snsTag + freshTag + trustTag + layerTag + '</div>'
    + '</div>'
    + snsInfo
    + '<div class="i-body">' + escHtml(item.summary_ja || '') + '</div>'
    + '<div class="' + noteClass + '">→ ' + escHtml(item.post_hint || '') + '</div>'
    + '<div class="i-actions">'
    + '<button class="btn btn-use" onclick="useIntel(this)">' + btnLabel + '</button>'
    + '<button class="btn" onclick="toggleBookmark(this,\'' + escAttr(iid) + '\')"' + bmStyle + '>' + bmLabel + '</button>'
    + '<button class="btn">skip</button>'
    + '</div>'
    + '</div>'
    + '</div>';
}

// ---- Intel パネル描画 ----
function renderIntel(data) {
  _iidCtr = 0;
  window._intelItems = {};
  const body = document.getElementById('intel-body');
  const featured = data.featured || [];
  const all = data.all || [];

  // 日付ナビ更新
  const todayStr = getTodayStr();
  const displayDate = data.date || todayStr;
  const dp = displayDate.split('-');
  const lbl = document.getElementById('idn-label');
  if (lbl) lbl.textContent = displayDate === todayStr ? '今日 ' + dp[1] + '.' + dp[2] : dp[1] + '.' + dp[2];
  const nextBtn = document.getElementById('idn-next');
  if (nextBtn) nextBtn.disabled = displayDate >= todayStr;

  if (all.length === 0) {
    body.innerHTML = '<div style="color:var(--white3);font-size:12px;padding:32px;text-align:center;">この日のインプットはまだありません</div>';
    return;
  }

  let html = '';

  // 注目セクション
  if (featured.length > 0) {
    html += '<div class="s-div" style="margin:12px 0 8px">'
      + '<span class="s-div-line"></span>'
      + '<span class="s-div-label" style="padding:0 10px;font-size:11px">注目 (' + featured.length + ')</span>'
      + '<span class="s-div-line"></span>'
      + '</div>';
    html += featured.map(item => buildIntelCard(item)).join('');
  }

  // すべてセクション（featured以外）
  const featTitles = new Set(featured.map(f => f.title));
  const rest = all.filter(i => !featTitles.has(i.title));
  if (rest.length > 0) {
    html += '<div class="s-div" style="margin:12px 0 8px">'
      + '<span class="s-div-line"></span>'
      + '<span class="s-div-label" style="padding:0 10px;font-size:11px">すべて (' + rest.length + ')</span>'
      + '<span class="s-div-line"></span>'
      + '</div>';
    html += rest.map(item => buildIntelCard(item)).join('');
  }

  body.innerHTML = html;
}

// ---- Intel 日付ナビ ----
let _currentIntelDate = null;

function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

function navIntelDate(direction) {
  const base = _currentIntelDate || getTodayStr();
  const d = new Date(base + 'T12:00:00');
  d.setDate(d.getDate() + direction);
  const today = getTodayStr();
  const newDate = d.toISOString().split('T')[0];
  if (newDate > today) return;
  _currentIntelDate = (newDate === today) ? null : newDate;
  loadIntel();
}

async function loadIntel() {
  const dateParam = _currentIntelDate ? '?date=' + _currentIntelDate : '';
  try {
    const res = await fetch('/api/research' + dateParam);
    const data = await res.json();
    renderIntel(data);
  } catch (e) {
    console.error('intel load error', e);
  }
}

// ---- プラットフォーム切替 ----
async function togglePlatform(postId) {
  const el = document.getElementById('post-' + postId);
  if (!el) return;
  const badge = el.querySelector('.platform');
  const isX = badge.classList.contains('px');
  const newPlatform = isX ? 'Threads' : 'X';
  try {
    const res = await fetch('/api/queue/' + encodeURIComponent(postId), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ platform: newPlatform }),
    });
    if (!res.ok) throw new Error('API error');
    badge.classList.toggle('px', !isX);
    badge.classList.toggle('pt', isX);
    badge.textContent = newPlatform === 'X' ? 'X' : 'THREADS';
  } catch (e) {
    console.error('platform toggle failed', e);
  }
}

// ---- タブ切替 ----
function switchQTab(tab) {
  ['pending','approved'].forEach(t => {
    document.getElementById('qtab-' + t).classList.toggle('active', t === tab);
    document.getElementById('qpanel-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'approved') loadApproved();
}

// ---- 時刻フォーマット ----
function fmtTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// ---- 投稿カード共通HTML生成 ----
function buildPostCard(post, pid) {
  const platformClass = post.platform === 'X' ? 'px' : 'pt';
  const platformLabel = post.platform === 'X' ? 'X' : 'THREADS';
  const trust = post.source_item && post.source_item.trust;
  const trustClass = trust === 'HIGH' ? 'tr-h' : 'tr-m';
  const trustLabel = trust || 'MID';
  const srcName = (post.source_item && post.source_item.source_name) || '—';
  const srcUrl = (post.source_item && post.source_item.source_url) || '';
  const srcLink = srcUrl ? ' <a class="src-link" href="' + escAttr(srcUrl) + '" target="_blank">↗</a>' : '';
  const postTypeNum = post.post_type || '';
  const priorityTypes = ['型⑤','型⑥','型⑦'];
  const alertTypes = ['型③','型④'];
  const typeTagClass = priorityTypes.includes(postTypeNum) ? 't-g' : alertTypes.includes(postTypeNum) ? 't-r' : 't-b';
  const postTypeTag = postTypeNum ? '<span class="tag ' + typeTagClass + '">' + escHtml(postTypeNum) + '</span>' : '';
  const themeTag = (post.source_item && post.source_item.theme_tag)
    ? '<span class="tag t-w">' + escHtml(post.source_item.theme_tag) + '</span>' : '';
  const charTag = post.character_tag ? '<span class="tag t-w">' + escHtml(post.character_tag) + '</span>' : '';
  const threadTag = post.thread_role ? '<span class="tag t-a">' + escHtml(post.thread_role) + '</span>' : '';
  const score = post.quality_score != null ? Number(post.quality_score).toFixed(1) : '—';
  const l1 = post.layer1 || (post.source_item && post.source_item.summary_ja) || '—';
  const l2 = post.layer2 || '—';
  const l3 = post.layer3 || '—';
  return { platformClass, platformLabel, trustClass, trustLabel, srcName, srcLink,
           postTypeTag, themeTag, charTag, threadTag, score, l1, l2, l3 };
}

// ---- 承認済みパネル描画 ----
function renderApproved(posts) {
  const body = document.getElementById('queue-body-approved');
  if (posts.length === 0) {
    body.innerHTML = '<div style="color:var(--white3);font-size:12px;padding:32px;text-align:center;">承認済みの投稿はありません</div>';
    return;
  }
  const statusMap = {
    approved: ['st-approved','承認済み'],
    posted:   ['st-posted','投稿済み'],
    failed:   ['st-failed','失敗'],
    rejected: ['st-failed','却下'],
  };
  body.innerHTML = posts.map(post => {
    const pid = escAttr(post.id);
    const c = buildPostCard(post, pid);
    const [stClass, stLabel] = statusMap[post.status] || ['st-pending','待機中'];
    const timeAt = post.posted_at || post.approved_at || post.created_at;
    const timeStr = fmtTime(timeAt);
    const timeLabel = post.posted_at ? '投稿 ' + timeStr : '承認 ' + timeStr;
    const isPosted = post.status === 'posted';
    const isFailed = post.status === 'failed';

    // URL表示（投稿済みのみ）
    const urlRow = (isPosted && post.platform_url)
      ? '<div class="p-posted-url">↗ <a href="' + escAttr(post.platform_url) + '" target="_blank">' + escHtml(post.platform_url) + '</a></div>'
      : '';

    // アクションボタン
    let actions;
    if (isPosted) {
      actions = '<button class="pa pa-ed" onclick="editApproved(\'' + pid + '\')" style="border-right:1px solid var(--border)">✎ 編集</button>'
        + '<button class="pa pa-del" onclick="deletePost(\'' + pid + '\')">✕ 削除</button>'
        + '<button class="pa pa-now" disabled>✓ 投稿済み</button>';
    } else if (isFailed) {
      actions = '<button class="pa pa-ed" onclick="editApproved(\'' + pid + '\')" style="border-right:1px solid var(--border)">✎ 編集</button>'
        + '<button class="pa pa-del" onclick="deletePost(\'' + pid + '\')">✕ 削除</button>'
        + '<button class="pa pa-now" id="now-' + pid + '" onclick="postNow(\'' + pid + '\')">↺ 再投稿</button>';
    } else {
      actions = '<button class="pa pa-ed" onclick="editApproved(\'' + pid + '\')" style="border-right:1px solid var(--border)">✎ 編集</button>'
        + '<button class="pa pa-del" onclick="deletePost(\'' + pid + '\')">✕ 削除</button>'
        + '<button class="pa pa-now" id="now-' + pid + '" onclick="postNow(\'' + pid + '\')">▶ 今すぐ</button>';
    }

    return '<div class="post" id="apr-' + pid + '" style="opacity:1">'
      + '<div class="p-head">'
      + '<span class="platform ' + c.platformClass + '">' + c.platformLabel + '</span>'
      + '<span class="st-badge ' + stClass + '">' + stLabel + '</span>'
      + '<div class="tags" style="flex:1;margin-left:4px">' + c.postTypeTag + c.themeTag + '</div>'
      + '<span style="font-family:var(--mono);font-size:9px;color:var(--white3);white-space:nowrap">' + timeLabel + '</span>'
      + '</div>'
      + '<div class="p-body" id="aprbody-' + pid + '">' + escHtml(post.post_text || '') + '</div>'
      + urlRow
      + '<div class="p-actions" style="grid-template-columns:1fr 1fr 1fr">'
      + actions
      + '</div>'
      + '</div>';
  }).join('');
}

// ---- 承認済みタブ 読み込み ----
async function loadApproved() {
  const body = document.getElementById('queue-body-approved');
  body.innerHTML = '<div style="color:var(--white3);font-size:12px;padding:24px;text-align:center;">読み込み中...</div>';
  try {
    const res = await fetch('/api/queue/all');
    const data = await res.json();
    renderApproved(data);
  } catch (e) {
    body.innerHTML = '<div style="color:var(--red);font-size:12px;padding:24px;text-align:center;">読み込み失敗</div>';
  }
}

// ---- 承認済みカードの編集 ----
function editApproved(postId) {
  const el = document.getElementById('apr-' + postId);
  if (!el) return;
  const bodyEl = el.querySelector('.p-body');
  const actEl = el.querySelector('.p-actions');
  const origText = bodyEl.textContent;
  bodyEl.innerHTML = '<textarea id="edit-ta2-' + escAttr(postId) + '" style="width:100%;min-height:120px;background:var(--bg2);color:var(--white);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:13px;line-height:1.6;resize:vertical;box-sizing:border-box;">' + escHtml(origText) + '</textarea>';
  actEl.innerHTML = '<button class="pa pa-ok" style="grid-column:span 2;border-right:1px solid var(--border)" onclick="saveEditApproved(\'' + escAttr(postId) + '\')">保存</button>'
    + '<button class="pa pa-ed" onclick="cancelEditApproved(\'' + escAttr(postId) + '\',\'' + escAttr(origText) + '\')">キャンセル</button>';
  actEl.style.gridTemplateColumns = '1fr 80px';
}

async function saveEditApproved(postId) {
  const ta = document.getElementById('edit-ta2-' + postId);
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) return;
  try {
    const res = await fetch('/api/edit/' + encodeURIComponent(postId), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ post_text: newText }),
    });
    if (!res.ok) throw new Error('API error');
    await loadApproved();
  } catch (e) {
    alert('保存失敗: ' + e.message);
  }
}

function cancelEditApproved(postId, origText) {
  const el = document.getElementById('apr-' + postId);
  if (!el) return;
  el.querySelector('.p-body').textContent = origText;
  el.querySelector('.p-actions').style.gridTemplateColumns = '1fr 1fr 1fr';
  loadApproved();
}

// ---- 削除 ----
async function deletePost(postId) {
  if (!confirm('この投稿を削除しますか？')) return;
  try {
    const res = await fetch('/api/queue/' + encodeURIComponent(postId), { method: 'DELETE' });
    if (!res.ok) throw new Error('API error');
    // カードをフェードアウト
    const el = document.getElementById('apr-' + postId);
    if (el) { el.style.transition = 'opacity 0.25s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 250); }
    // 未承認タブにある場合も削除
    const pel = document.getElementById('post-' + postId);
    if (pel) { pel.style.transition = 'opacity 0.25s'; pel.style.opacity = '0'; setTimeout(() => pel.remove(), 250); }
    updateCount();
  } catch (e) {
    alert('削除失敗: ' + e.message);
  }
}

// ---- 今すぐ投稿 ----
async function postNow(postId) {
  const btn = document.getElementById('now-' + postId);
  if (btn) { btn.disabled = true; btn.textContent = '投稿中...'; }
  try {
    const res = await fetch('/api/post-now/' + encodeURIComponent(postId), { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      // 承認済みタブを再描画
      await loadApproved();
    } else {
      if (btn) { btn.disabled = false; btn.textContent = '↺ 再試行'; }
      alert('投稿失敗: ' + (data.error || '不明なエラー'));
    }
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = '↺ 再試行'; }
    alert('投稿失敗: ' + e.message);
  }
}

// ---- Stats パネル描画 ----
function renderStats(data) {
  const body = document.getElementById('stats-body');
  const y = data.yesterday || {};
  const imp = y.total_impressions || 0;
  const likeRate = ((y.avg_like_rate || 0) * 100).toFixed(1);
  const saveRate = ((y.avg_save_rate || 0) * 100).toFixed(1);
  const postCount = y.post_count || 0;
  const impStr = imp >= 1000 ? (imp / 1000).toFixed(1) + 'k' : String(imp);

  let html = '<div class="stat-grid">'
    + '<div class="stat"><div class="stat-lbl">IMPRESSIONS</div><div class="stat-num">' + impStr + '</div><div class="stat-d">昨日合計</div></div>'
    + '<div class="stat"><div class="stat-lbl">LIKE RATE</div><div class="stat-num">' + likeRate + '%</div><div class="stat-d">平均</div></div>'
    + '<div class="stat"><div class="stat-lbl">SAVE RATE</div><div class="stat-num">' + saveRate + '%</div><div class="stat-d">平均</div></div>'
    + '<div class="stat"><div class="stat-lbl">POSTS</div><div class="stat-num">' + postCount + '</div><div class="stat-d">昨日</div></div>'
    + '</div>';

  if (data.mvp_post) {
    const m = data.mvp_post;
    html += '<div class="mvp">'
      + '<div class="mvp-text">「' + escHtml(m.content || '') + '」</div>'
      + '<div class="mvp-row">'
      + '<span class="mvp-stat">❤ <em>' + (m.likes || 0) + '</em></span>'
      + '<span class="mvp-stat">🔖 <em>' + (m.saves || 0) + '</em></span>'
      + '<span class="mvp-stat">👁 <em>' + (m.impressions || 0) + '</em></span>'
      + '</div></div>';
  }

  const analystRows = (data.analyst_summary || []);
  if (analystRows.length > 0) {
    const dotCols = ['ad-g','ad-g','ad-a','ad-b','ad-r'];
    html += '<div class="s-div"><span class="s-div-label">ANALYST</span><span class="s-div-line"></span></div>';
    html += analystRows.map((row, i) =>
      '<div class="arow"><div class="adot ' + dotCols[i % dotCols.length] + '"></div><div class="atxt">' + escHtml(row) + '</div></div>'
    ).join('');
  }

  const personasData = (data.personas && (data.personas.personas || data.personas.persona_list)) || [];
  if (personasData.length > 0) {
    const rankClasses = ['pr-core','pr-grow','pr-wild'];
    const rankLabels = ['CORE','GROW','WILD'];
    html += '<div class="s-div"><span class="s-div-label">PERSONAS</span><span class="s-div-line"></span></div>';
    html += personasData.slice(0, 3).map((p, i) => {
      const name = p.name || p.persona_name || '';
      const desc = p.description || p.desc || '';
      const chips = (p.behaviors || p.chips || p.keywords || []);
      return '<div class="persona">'
        + '<div class="persona-head">'
        + '<span class="p-rank ' + rankClasses[i] + '">' + rankLabels[i] + '</span>'
        + '<span class="p-name">' + escHtml(name) + '</span>'
        + '</div>'
        + '<div class="persona-body">'
        + '<div class="p-desc">' + escHtml(desc) + '</div>'
        + '<div class="chips">' + chips.map(c => '<span class="chip">' + escHtml(c) + '</span>').join('') + '</div>'
        + '</div></div>';
    }).join('');
  }

  if (!data.mvp_post && analystRows.length === 0 && personasData.length === 0) {
    html += '<div style="color:var(--white3);font-size:12px;padding:32px;text-align:center;">データがまだありません</div>';
  }

  body.innerHTML = html;
}

// ---- 投稿履歴 描画 ----
function renderPublished(posts) {
  const wrap = document.getElementById('hist-wrap');
  let html = '<div class="s-div" style="margin-top:4px">'
    + '<span class="s-div-label">HISTORY</span>'
    + '<span class="s-div-line"></span>'
    + '</div>';

  if (posts.length === 0) {
    html += '<div style="color:var(--white3);font-size:12px;padding:12px 0 8px;text-align:center;">投稿履歴はまだありません</div>';
    wrap.innerHTML = html;
    return;
  }

  html += posts.map(post => {
    // ベストメトリクス（24h > 6h > 1h）
    const m = post.metrics_24h || post.metrics_6h || post.metrics_1h || null;
    const imp  = m ? (m.impressions || 0) : null;
    const likes = m ? (m.likes || 0) : null;
    const saves = m ? (m.saves || 0) : null;
    // 保存率 0.5% 以上 → featured
    const saveRate = (imp && saves) ? saves / imp : 0;
    const isFeat = saveRate >= 0.005;
    // 日時
    const d = new Date(post.posted_at);
    const dateStr = (d.getMonth()+1).toString().padStart(2,'0') + '.'
      + d.getDate().toString().padStart(2,'0') + ' · '
      + d.getHours().toString().padStart(2,'0') + ':'
      + d.getMinutes().toString().padStart(2,'0');
    // プラットフォーム
    const platClass = post.platform === 'X' ? 'px' : 'pt';
    const platLabel = post.platform === 'X' ? 'X' : 'THREADS';
    // メトリクス表示
    const fmtNum = n => n == null ? '—' : n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n);
    const metricsHtml = '<div class="hist-metrics">'
      + '<span class="hist-m">❤ <em>' + fmtNum(likes) + '</em></span>'
      + '<span class="hist-m">🔖 <em>' + fmtNum(saves) + '</em></span>'
      + '<span class="hist-m">👁 <em>' + fmtNum(imp) + '</em></span>'
      + (saveRate > 0 ? '<span class="hist-m" style="margin-left:auto;color:' + (isFeat ? 'var(--green)' : 'var(--white3)') + '">'
        + (saveRate * 100).toFixed(2) + '% save</span>' : '')
      + '</div>';
    // URL リンク
    const urlHtml = post.url
      ? ' <a href="' + escAttr(post.url) + '" target="_blank" style="font-family:var(--mono);font-size:9px;color:var(--white3);text-decoration:none;margin-left:4px">↗</a>'
      : '';

    return '<div class="hist-card' + (isFeat ? ' hist-feat' : '') + '">'
      + '<div class="i-bar"></div>'
      + '<div class="hist-inner">'
      + '<div class="hist-head">'
      + '<span class="platform ' + platClass + '">' + platLabel + '</span>'
      + (post.post_type ? '<span class="tag t-w">' + escHtml(post.post_type) + '</span>' : '')
      + '<span class="hist-date">' + dateStr + urlHtml + '</span>'
      + '</div>'
      + '<div class="hist-body">' + escHtml(post.content || '') + '</div>'
      + metricsHtml
      + '</div>'
      + '</div>';
  }).join('');

  wrap.innerHTML = html;
}

// ---- ヘッダー日時更新 ----
function updateHeaderDate() {
  const now = new Date();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const hh = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  const el = document.getElementById('h-date');
  if (el) el.textContent = mm + '.' + dd + ' · ' + hh + ':' + min;
}

// ---- PEOPLE タブ切替 ----
function switchPTab(tab) {
  ['watch','engage','similar'].forEach(t => {
    document.getElementById('ptab-' + t).classList.toggle('active', t === tab);
    document.getElementById('ppanel-' + t).classList.toggle('active', t === tab);

// ---- PEOPLE カード HTML生成 ----
function buildPeopleCard(person, type) {
  const fmtNum = n => n >= 10000 ? (n/10000).toFixed(1) + 'w' : n >= 1000 ? (n/1000).toFixed(1) + 'k' : String(n);
  const trustClass = person.trust_level === 'HIGH' ? 't-g' : person.trust_level === 'MID' ? 't-b' : 't-w';
  const overlapClass = person.overlap === 'HIGH' ? 't-g' : person.overlap === 'MID' ? 't-b' : 't-w';
  const accountId = escAttr(person.account || '');
  const iidKey = 'ppl-' + accountId;

  let extraInfo = '';
  if (type === 'watch') {
    extraInfo = (person.latest_buzz ? '<div class="ppl-buzz">"' + escHtml(person.latest_buzz) + '"</div>' : '')
      + (person.analyst_comment ? '<div style="font-size:10px;color:var(--white3);margin-bottom:8px">→ ' + escHtml(person.analyst_comment) + '</div>' : '');
  } else if (type === 'similar') {
    extraInfo = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">'
      + (person.strength ? '<span class="tag t-g">強み: ' + escHtml(person.strength.slice(0,15)) + '</span>' : '')
      + (person.weakness ? '<span class="tag t-r">弱み: ' + escHtml(person.weakness.slice(0,15)) + '</span>' : '')
      + '</div>';
  }

  const analyzeBtn = type !== 'engage'
    ? '<button class="btn" style="color:var(--blue);border-color:rgba(80,144,240,0.3)" onclick="analyzeAccount(\'' + accountId + '\')">投稿を分析</button>'
    : '';

  return '<div class="ppl-card" id="pplcard-' + accountId + '">'
    + '<div class="ppl-head">'
    + '<span class="ppl-handle">' + escHtml(person.account || '') + '</span>'
    + '<span class="ppl-name">' + escHtml(person.name || '') + '</span>'
    + (person.follower_count ? '<span class="ppl-fc">' + fmtNum(person.follower_count) + '</span>' : '')
    + '</div>'
    + '<div class="ppl-body">'
    + '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">'
    + (person.trust_level ? '<span class="tag ' + trustClass + '">' + escHtml(person.trust_level) + '</span>' : '')
    + (person.overlap ? '<span class="tag ' + overlapClass + '">重複: ' + escHtml(person.overlap) + '</span>' : '')
    + (person.post_frequency ? '<span class="tag t-w">' + escHtml(person.post_frequency) + '</span>' : '')
    + '</div>'
    + '<div class="ppl-desc">' + escHtml(person.description || '') + '</div>'
    + extraInfo
    + '<div class="ppl-actions">'
    + analyzeBtn
    + '<button class="btn" onclick="markEngaged(\'' + accountId + '\')">絡んだ</button>'
    + '<button class="btn" onclick="markFollowed(\'' + accountId + '\')">フォロー済</button>'
    + '</div>'
    + '</div>'
    + '<div class="ppl-analysis" id="ppl-analysis-' + accountId + '"></div>'
    + '</div>';
}

function renderPeople(data) {
  const watchBody = document.getElementById('people-watch-body');
  const engageBody = document.getElementById('people-engage-body');
  const similarBody = document.getElementById('people-similar-body');

  const watch = data.watch || [];
  const engage = data.engage || [];

    : '<div style="color:var(--white3);font-size:12px;padding:32px;text-align:center;">まだ絡んだ記録がありません</div>';

  similarBody.innerHTML = similar.length > 0
    ? similar.map(p => buildPeopleCard(p, 'similar')).join('')
    : '<div style="color:var(--white3);font-size:12px;padding:32px;text-align:center;">競合アカウントは未登録です</div>';
}

// ---- アカウント分析 ----
async function analyzeAccount(account) {
  const analysisEl = document.getElementById('ppl-analysis-' + account);
  if (!analysisEl) return;
  analysisEl.innerHTML = '<div style="color:var(--white3);font-size:11px;padding:8px 0">分析中...</div>';
  analysisEl.classList.add('open');

  // X APIでツイート取得は現状スキップ（Free Tier制限）→ 空配列で分析
  try {
    const res = await fetch('/api/people/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ account, tweets: [] }),
    });
    const data = await res.json();
    if (data.success && data.analysis) {
      const a = data.analysis;
      analysisEl.innerHTML = '<strong>バズパターン：</strong>' + escHtml(a.buzz_pattern || '—') + '<br>'
        + '<strong>頻出型：</strong>' + escHtml((a.top_types || []).join(' / ') || '—') + '<br>'
        + '<strong>頻出語：</strong>' + escHtml((a.keywords || []).join('・') || '—') + '<br>'
        + (a.sample_post ? '<div style="margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:4px;font-style:italic">"' + escHtml(a.sample_post) + '"</div>' : '')
        + '<div style="margin-top:10px"><button class="btn" style="color:var(--green);border-color:rgba(200,240,74,0.3)" onclick="reflectInsights()">全エージェントに反映</button></div>';
    } else {
      analysisEl.innerHTML = '<div style="color:var(--red);font-size:11px">分析失敗: ' + escHtml(data.error || '不明') + '</div>';
    }
  } catch (e) {
    analysisEl.innerHTML = '<div style="color:var(--red);font-size:11px">エラー: ' + escHtml(e.message) + '</div>';
  }
}

// ---- 全エージェントに反映 ----
async function reflectInsights() {
  try {
    const res = await fetch('/api/people/reflect', { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      alert(`✓ ${data.count}件の分析データを全エージェントに反映しました`);
    }
  } catch (e) {
    alert('反映失敗: ' + e.message);
  }
}

// ---- API残量表示（B-3）----
async function loadApiStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const wrap = document.getElementById('h-api-status');
    const anthropicEl = document.getElementById('api-anthropic');
    const xEl = document.getElementById('api-x');
    if (!wrap || !anthropicEl || !xEl) return;

    // Anthropic残高
    const balance = data.anthropic?.balance;
    if (balance != null) {
      const b = parseFloat(balance);
      anthropicEl.textContent = '$' + b.toFixed(2);
      anthropicEl.className = 'api-item' + (b <= 3 ? ' warn' : b <= 0 ? ' err' : ' ok');
    } else {
      anthropicEl.textContent = '$—';
    }

    // X API残量
    const xRemain = data.x?.posts_remaining;
    if (xRemain != null) {
      xEl.textContent = 'X ' + xRemain;
      xEl.className = 'api-item' + (xRemain <= 200 ? ' warn' : xRemain <= 0 ? ' err' : ' ok');
    } else {
      xEl.textContent = 'X —';
    }

    wrap.style.display = 'flex';
  } catch {
    // スキップ
  }
}

// ---- 初期ロード ----
async function loadAll() {
  updateHeaderDate();

  try {
    const [queueRes, statsRes, pubRes] = await Promise.all([
      fetch('/api/queue'),
      fetch('/api/metrics'),
      fetch('/api/posts/published'),
    ]);
    const [queueData, statsData, pubData] = await Promise.all([
      queueRes.json(),
      statsRes.json(),
      pubRes.json(),
    ]);
    renderQueue(queueData);
    renderStats(statsData);
    renderPublished(pubData);
  } catch (e) {
    console.error('load error', e);
  }
  await loadIntel();
  loadApiStatus();
}

// ---- 日次リセット ----
let _pollDate = null;
function startDatePoller() {
  _pollDate = new Date().toISOString().split('T')[0];
  setInterval(() => {
    const today = new Date().toISOString().split('T')[0];
    if (today !== _pollDate) {
      _pollDate = today;
      loadAll();
    }
  }, 30 * 60 * 1000);
}

document.addEventListener('DOMContentLoaded', () => { loadAll(); startDatePoller(); });
</script>
